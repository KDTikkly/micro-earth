<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 黑色背景 -->
  <rect width="256" height="256" fill="#0a0514"/>
  <!-- 外六边形边框 (霓虹粉) -->
  <polygon points="128,12 224,68 224,188 128,244 32,188 32,68"
    stroke="#FF69B4" stroke-width="6" fill="none"/>
  <!-- 中层菱形 (电子紫) -->
  <polygon points="128,40 200,128 128,216 56,128"
    stroke="#9370DB" stroke-width="4" fill="rgba(147,112,219,0.1)"/>
  <!-- 内层正方形 (电光蓝) -->
  <rect x="88" y="88" width="80" height="80" stroke="#00BFFF" stroke-width="3" fill="rgba(0,191,255,0.08)"/>
  <!-- 中心像素点 -->
  <rect x="112" y="112" width="32" height="32" fill="#FF69B4"/>
  <rect x="120" y="120" width="16" height="16" fill="#FFEE00"/>
  <!-- 角点像素装饰 -->
  <rect x="20"  y="20"  width="12" height="12" fill="#FF69B4"/>
  <rect x="224" y="20"  width="12" height="12" fill="#FFEE00"/>
  <rect x="20"  y="224" width="12" height="12" fill="#00BFFF"/>
  <rect x="224" y="224" width="12" height="12" fill="#9370DB"/>
  <!-- 十字线 -->
  <line x1="128" y1="32" x2="128" y2="224" stroke="#9370DB" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
  <line x1="32"  y1="128" x2="224" y2="128" stroke="#9370DB" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
</svg>
