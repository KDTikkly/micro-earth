name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate icon.ico from icon.png
        working-directory: electron
        run: |
          npm install
          node make-ico.cjs

      - name: Build & Publish Windows NSIS installer
        working-directory: electron
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            electron/package-lock.json

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate icns from png
        working-directory: electron
        run: |
          mkdir -p assets/icon.iconset
          sips -z 16 16   assets/icon.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32   assets/icon.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32   assets/icon.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64   assets/icon.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out assets/icon.iconset/icon_512x512.png
          cp assets/icon.png assets/icon.iconset/icon_512x512@2x.png
          iconutil -c icns assets/icon.iconset -o assets/icon.icns

      - name: Install Electron deps
        working-directory: electron
        run: npm install

      - name: Build & Publish macOS DMG
        working-directory: electron
        run: npx electron-builder --mac dmg --x64 --arm64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

  publish-package:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@kdtikkly'

      - name: Set version from tag
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          # 补全为三段式版本号：11.2 -> 11.2.0
          DOTS=$(echo "$VERSION" | tr -cd '.' | wc -c)
          if [ "$DOTS" -lt 2 ]; then VERSION="${VERSION}.0"; fi
          if [ "$DOTS" -lt 1 ]; then VERSION="${VERSION}.0"; fi
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
